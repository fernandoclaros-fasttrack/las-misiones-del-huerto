<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { background: #EFE7D4; }
  button { font-family: inherit; }
  a { color: #5B8C3E; text-decoration: none; }
  a:hover { color: #3F6B26; }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(4px) scale(.85); }
    18%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-40px) scale(1.15); }
  }
  @keyframes popNum {
    0% { transform: scale(.7); }
    55% { transform: scale(1.14); }
    100% { transform: scale(1); }
  }
  ::-webkit-scrollbar { height: 0; width: 0; }
</style>
</helmet>

<div style="min-height:100vh;background:#EFE7D4;font-family:'Nunito',system-ui,sans-serif;color:#3A3228;display:flex;justify-content:center;">
  <div style="width:100%;max-width:500px;display:flex;flex-direction:column;min-height:100vh;background:#EFE7D4;">

    <header style="position:sticky;top:0;z-index:20;background:{{ accent }};color:#F6F1E2;padding:18px 22px 22px;border-radius:0 0 26px 26px;box-shadow:0 8px 22px rgba(58,50,40,.20);">
      <div style="display:flex;align-items:center;gap:8px;font-family:'Bitter',serif;font-weight:600;font-size:14px;letter-spacing:.2px;opacity:.92;">
        <span style="font-size:17px;">🌿</span> Las misiones del huerto
      </div>
      <div style="position:relative;display:flex;align-items:flex-end;gap:9px;margin-top:12px;">
        <span key="{{ pointsKey }}" style="font-family:'Bitter',serif;font-weight:700;font-size:60px;line-height:.9;animation:popNum .4s ease;">{{ points }}</span>
        <span style="font-family:'Nunito',sans-serif;font-weight:800;font-size:22px;padding-bottom:8px;opacity:.9;">puntos</span>
        <sc-if value="{{ showFloat }}" hint-placeholder-val="{{ false }}">
          <span key="{{ floatKey }}" style="position:absolute;left:2px;top:-14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:24px;color:{{ floatColor }};animation:floatUp 1s ease forwards;pointer-events:none;">{{ floatText }}</span>
        </sc-if>
      </div>
      <div style="font-size:13.5px;opacity:.82;margin-top:3px;font-weight:600;">acumulados esta semana 🌻</div>
    </header>

    <nav style="display:flex;gap:8px;overflow-x:auto;padding:16px 16px 6px;flex:0 0 auto;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="7">
        <button onClick="{{ t.onClick }}" style="{{ t.style }}">
          <span>{{ t.short }}</span>
          <sc-if value="{{ t.isToday }}" hint-placeholder-val="{{ false }}">
            <span style="display:block;width:5px;height:5px;border-radius:50%;background:{{ t.dotColor }};margin:4px auto 0;"></span>
          </sc-if>
        </button>
      </sc-for>
    </nav>

    <main style="flex:1;padding:8px 16px 44px;display:flex;flex-direction:column;gap:12px;">
      <div style="display:flex;align-items:baseline;justify-content:space-between;padding:4px 6px 2px;">
        <span style="font-family:'Bitter',serif;font-weight:600;font-size:19px;">{{ dayLabel }}</span>
        <span style="font-size:13px;color:#8A7E6B;font-weight:700;">{{ doneCount }}/{{ totalCount }} hechas</span>
      </div>

      <sc-for list="{{ missions }}" as="m" hint-placeholder-count="6">
        <div style="{{ m.cardStyle }}">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="{{ m.tileStyle }}">{{ m.emoji }}</div>
            <span style="{{ m.titleStyle }} flex:1;min-width:0;">{{ m.title }}</span>
            <span style="{{ m.badgeStyle }}">{{ m.points }} pts</span>
          </div>
          <div style="display:flex;gap:7px;margin-top:13px;">
            <sc-for list="{{ m.options }}" as="opt" hint-placeholder-count="4">
              <button onClick="{{ opt.onClick }}" title="{{ opt.label }}" style="{{ opt.style }}">
                <span style="font-size:18px;line-height:1;">{{ opt.icon }}</span>
                <sc-if value="{{ opt.active }}" hint-placeholder-val="{{ false }}">
                  <span style="margin-left:7px;font-weight:800;font-size:13px;white-space:nowrap;">{{ opt.label }}</span>
                </sc-if>
              </button>
            </sc-for>
          </div>
        </div>
      </sc-for>

      <sc-if value="{{ emptyDay }}" hint-placeholder-val="{{ false }}">
        <div style="text-align:center;padding:48px 20px;color:#9A8E77;">
          <div style="font-size:40px;">🪴</div>
          <div style="margin-top:10px;font-weight:700;font-size:16px;">No hay misiones para este día</div>
          <div style="margin-top:4px;font-size:13.5px;">¡Disfruta del descanso!</div>
        </div>
      </sc-if>
    </main>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 440, &quot;height&quot;: 900 },
  &quot;basePoints&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 40, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Datos&quot;, &quot;min&quot;: 0, &quot;max&quot;: 999, &quot;unit&quot;: &quot;pts&quot; },
  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#47702F&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Estilo&quot;, &quot;options&quot;: [&quot;#47702F&quot;, &quot;#5B8C3E&quot;, &quot;#3E6B57&quot;, &quot;#B4633A&quot;] }
}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.META = {
      pendiente:  { label: "Pendiente",   icon: "🌰", bg: "#ECE3D0", ring: "#C6B592", fg: "#7C6E52" },
      progreso:   { label: "En progreso", icon: "🌱", bg: "#F6E9C4", ring: "#DBA92C", fg: "#957414" },
      bloqueada:  { label: "Bloqueada",   icon: "🥀", bg: "#F1DACF", ring: "#C4664A", fg: "#A04A32" },
      completada: { label: "Completada",  icon: "🌻", bg: "#DDEBC9", ring: "#5B8C3E", fg: "#3F6B26" },
    };
    this.ORDER = ["pendiente", "progreso", "bloqueada", "completada"];
    this.state = {
      days: this.seed(),
      selected: this.todayIdx(),
      floatKey: 0, floatText: "", floatColor: "#C7E39A", showFloat: false,
      pointsKey: 0,
    };
    this._t = null;
  }

  todayIdx() { return (new Date().getDay() + 6) % 7; } // Lunes = 0

  seed() {
    const D = (label, short, missions) => ({ label, short, missions });
    const m = (id, emoji, title, points, status) => ({ id, emoji, title, points, status: status || "pendiente" });
    return [
      D("Lunes", "Lun", [
        m("lun1", "🛏️", "Hacer la cama", 10),
        m("lun2", "🍴", "Poner la mesa", 10),
        m("lun3", "🪴", "Regar las plantas del huerto", 10, "progreso"),
        m("lun4", "🧸", "Recoger los juguetes", 10),
        m("lun5", "🗑️", "Sacar la basura", 10),
      ]),
      D("Martes", "Mar", [
        m("mar1", "🍽️", "Recoger mesa del comedor", 10),
        m("mar2", "🛏️", "Hacer las camas", 10, "completada"),
        m("mar3", "🧸", "Recoger el cuarto", 10, "progreso"),
        m("mar4", "🛋️", "Recoger el salón", 10),
        m("mar5", "🧹", "Aspirar el sofá", 15),
        m("mar6", "🧹", "Aspirar el salón", 15),
        m("mar7", "🫧", "Gestionar el lavavajillas", 10, "completada"),
        m("mar8", "🧺", "Recoger y doblar los trapos", 10),
        m("mar9", "👕", "Ayudar a tender la ropa", 10, "bloqueada"),
      ]),
      D("Miércoles", "Mié", [
        m("mie1", "🛏️", "Hacer la cama", 10),
        m("mie2", "🐶", "Dar de comer a la mascota", 10),
        m("mie3", "🎒", "Ordenar la mochila", 10),
        m("mie4", "🫧", "Poner el lavavajillas", 10),
        m("mie5", "🧹", "Barrer la cocina", 10),
      ]),
      D("Jueves", "Jue", [
        m("jue1", "🛏️", "Hacer la cama", 10),
        m("jue2", "🪴", "Regar el huerto", 10),
        m("jue3", "🧸", "Recoger el cuarto", 10),
        m("jue4", "🍳", "Ayudar con la cena", 10),
        m("jue5", "♻️", "Sacar el reciclaje", 10),
      ]),
      D("Viernes", "Vie", [
        m("vie1", "🛏️", "Hacer la cama", 10),
        m("vie2", "🛋️", "Recoger el salón", 10),
        m("vie3", "🖊️", "Limpiar tu escritorio", 10),
        m("vie4", "👕", "Doblar tu ropa", 10),
        m("vie5", "🍴", "Poner la mesa", 10),
      ]),
      D("Sábado", "Sáb", [
        m("sab1", "🛏️", "Cambiar las sábanas", 15),
        m("sab2", "🛁", "Limpiar el baño", 15),
        m("sab3", "🍂", "Recoger el jardín", 10),
        m("sab4", "🛒", "Ayudar con la compra", 10),
        m("sab5", "🚗", "Lavar el coche", 20),
      ]),
      D("Domingo", "Dom", [
        m("dom1", "🎒", "Preparar la mochila del lunes", 10),
        m("dom2", "🪴", "Regar las plantas", 10),
        m("dom3", "📚", "Ordenar los libros", 10),
        m("dom4", "🍳", "Ayudar a cocinar", 10),
      ]),
    ];
  }

  base() {
    const b = this.props.basePoints;
    return (b === undefined || b === null) ? 40 : b;
  }

  totalPoints() {
    let sum = this.base();
    this.state.days.forEach(d => d.missions.forEach(mi => {
      if (mi.status === "completada") sum += mi.points;
    }));
    return sum;
  }

  selectDay(i) { this.setState({ selected: i }); }

  setStatus(dayIdx, missionId, key) {
    let toggled = false;
    const days = this.state.days.map((d, di) => {
      if (di !== dayIdx) return d;
      return { ...d, missions: d.missions.map(mi => {
        if (mi.id !== missionId || mi.status === key) return mi;
        const wasDone = mi.status === "completada";
        const nowDone = key === "completada";
        if (wasDone !== nowDone) { toggled = true; this.flash(nowDone ? mi.points : -mi.points); }
        return { ...mi, status: key };
      }) };
    });
    // only bump pointsKey (which drives the number pop) when points actually change
    this.setState(s => ({ days, pointsKey: toggled ? s.pointsKey + 1 : s.pointsKey }));
  }

  flash(delta) {
    const txt = (delta > 0 ? "+" : "−") + Math.abs(delta);
    const color = delta > 0 ? "#CDE7A0" : "#F0C3A6";
    this.setState({ showFloat: true, floatText: txt, floatColor: color, floatKey: this.state.floatKey + 1 });
    if (this._t) clearTimeout(this._t);
    this._t = setTimeout(() => this.setState({ showFloat: false }), 1000);
  }

  componentWillUnmount() { if (this._t) clearTimeout(this._t); }

  renderVals() {
    const accent = this.props.accent || "#47702F";
    const sel = this.state.selected;

    const tabs = this.state.days.map((d, i) => {
      const on = i === sel;
      const isToday = i === this.todayIdx();
      const style = on
        ? `flex:0 0 auto;min-width:54px;padding:9px 12px;border-radius:15px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;background:${accent};color:#F6F1E2;box-shadow:0 4px 10px rgba(58,50,40,.18);`
        : `flex:0 0 auto;min-width:54px;padding:9px 12px;border-radius:15px;border:1px solid #E4DBC8;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;background:#FFFDF6;color:#8A7C60;`;
      return { short: d.short, style, isToday, dotColor: on ? "#F6F1E2" : accent, onClick: () => this.selectDay(i) };
    });

    const day = this.state.days[sel];
    const missions = (day ? day.missions : []).map(mi => {
      const meta = this.META[mi.status];
      const done = mi.status === "completada";
      const cardStyle = done
        ? "background:#EDF4E1;border:1.5px solid #CFE0B5;border-radius:20px;padding:15px 16px;box-shadow:0 2px 5px rgba(58,50,40,.05);transition:background .2s;"
        : "background:#FFFDF6;border:1px solid #EADFCB;border-radius:20px;padding:15px 16px;box-shadow:0 2px 6px rgba(58,50,40,.05);transition:background .2s;";
      const titleStyle = `font-family:'Nunito',sans-serif;font-weight:700;font-size:16.5px;line-height:1.25;color:${done ? "#4A6B33" : "#3A3228"};`;
      const badgeStyle = "flex:0 0 auto;background:#E5EFD6;color:#40682A;font-weight:800;font-size:12.5px;padding:5px 10px;border-radius:999px;white-space:nowrap;";
      const tileStyle = "flex:0 0 auto;width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:27px;background:" + (done ? "#DBEAC4" : "#F1ECDD") + ";";
      const options = this.ORDER.map(key => {
        const mm = this.META[key];
        const active = key === mi.status;
        const style = active
          ? `flex:1 1 auto;display:flex;align-items:center;justify-content:center;padding:10px 8px;border-radius:13px;cursor:pointer;min-height:46px;background:${mm.bg};border:2px solid ${mm.ring};color:${mm.fg};`
          : "flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:46px;padding:0;border-radius:13px;cursor:pointer;min-height:46px;background:#F4EEE1;border:1px solid #E7DECB;opacity:.7;filter:grayscale(.35);";
        return { icon: mm.icon, label: mm.label, active, style, onClick: () => this.setStatus(sel, mi.id, key) };
      });
      return { id: mi.id, emoji: mi.emoji, title: mi.title, points: mi.points, cardStyle, titleStyle, badgeStyle, tileStyle, options };
    });

    const doneCount = missions.filter(x => x.options.some(o => o.active && o.label === "Completada")).length;

    return {
      accent,
      points: this.totalPoints(),
      pointsKey: this.state.pointsKey,
      showFloat: this.state.showFloat,
      floatText: this.state.floatText,
      floatColor: this.state.floatColor,
      floatKey: this.state.floatKey,
      tabs,
      dayLabel: day ? "Misiones de " + day.label : "",
      missions,
      doneCount,
      totalCount: missions.length,
      emptyDay: missions.length === 0,
    };
  }
}
</script>
</body>
</html>
